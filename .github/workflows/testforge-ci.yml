# ============================================================
#  TestForge 自身 CI — 吃自己的狗糧
#  在每次 push/PR 時，用 TestForge 掃描 sample-vue-project
# ============================================================
name: '🔧 TestForge CI'

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: '🧪 測試 TestForge'
    runs-on: ubuntu-latest

    steps:
      # ---- Checkout ----
      - name: '📥 Checkout'
        uses: actions/checkout@v4

      # ---- 設定 Node.js ----
      - name: '📦 設定 Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ---- 安裝 TestForge 依賴 ----
      - name: '📦 安裝 TestForge 依賴'
        run: npm install

      # ---- 安裝 sample-vue-project 依賴 ----
      - name: '📦 安裝 sample-vue-project 依賴'
        run: |
          cd sample-vue-project
          npm install

      # ---- 產生測試 ----
      - name: '🔧 TestForge — 產生測試'
        run: node testforge.js ./sample-vue-project

      # ---- 執行測試 ----
      - name: '🧪 執行測試'
        run: |
          cd sample-vue-project
          npx vitest run \
            --update \
            --reporter=default \
            --reporter=json \
            --outputFile=testforge-results.json \
            --coverage \
            --coverage.reporter=json-summary \
            --coverage.reporter=text \
            --coverage.reporter=html

      # ---- 產生報告 ----
      - name: '📊 產生報告'
        if: always()
        run: node scripts/generate-report.js ./sample-vue-project 80

      # ---- 上傳報告 ----
      - name: '📤 上傳測試報告'
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testforge-report
          path: |
            sample-vue-project/TestForge-Report.md
            sample-vue-project/testforge-results.json
            UnitTest-Report.md
            Coverage-Report.md
          retention-days: 30

      # ---- 推送報告到分支（只在 main 分支 push 時） ----
      - name: '📤 推送報告到分支'
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: bash scripts/push-to-branch.sh ./sample-vue-project testforge/reports

      # ---- PR Comment ----
      - name: '💬 在 PR 上留言'
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const commentPath = 'sample-vue-project/testforge-pr-comment.md';

            if (!fs.existsSync(commentPath)) {
              console.log('沒有找到 PR comment 內容，跳過');
              return;
            }

            const body = fs.readFileSync(commentPath, 'utf-8');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existingComment = comments.find(c =>
              c.body.includes('<!-- testforge-report -->')
            );

            const commentBody = `<!-- testforge-report -->\n${body}`;

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: commentBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody,
              });
            }
