# ========================================
# 這是一個假設的 API 文件（OpenAPI / Swagger 格式）
# 很多後端框架（Express, FastAPI, Spring Boot）都能自動產生這個檔案
# 它描述了 API 有哪些 endpoint、接受什麼參數、回傳什麼
# ========================================

openapi: '3.0.0'
info:
  title: 線上商店 API
  version: '1.0.0'
  description: 一個電商平台的後端 API

servers:
  - url: http://localhost:3000

paths:
  # ---- 使用者相關 ----
  /api/users:
    get:
      summary: 取得所有使用者
      responses:
        '200':
          description: 使用者列表

    post:
      summary: 建立新使用者
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: 'Jeff'
                email:
                  type: string
                  format: email
                  example: 'jeff@example.com'
                age:
                  type: integer
                  example: 28
              required:
                - name
                - email

  /api/users/{id}:
    get:
      summary: 取得特定使用者
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 使用者資料
        '404':
          description: 找不到使用者

    put:
      summary: 更新使用者
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                age:
                  type: integer

    delete:
      summary: 刪除使用者
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string

  # ---- 商品相關 ----
  /api/products:
    get:
      summary: 取得商品列表
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: category
          in: query
          schema:
            type: string

  /api/products/{id}:
    get:
      summary: 取得特定商品
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string

  # ---- 訂單相關 ----
  /api/orders:
    post:
      summary: 建立訂單
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: string
                  example: 'user-123'
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      productId:
                        type: string
                        example: 'prod-456'
                      quantity:
                        type: integer
                        example: 2
                shippingAddress:
                  type: string
                  example: '台北市信義區'
              required:
                - userId
                - items

  /api/orders/{id}:
    get:
      summary: 取得訂單狀態
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string

  # ---- 健康檢查 ----
  /api/health:
    get:
      summary: 伺服器健康檢查
